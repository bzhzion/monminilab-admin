<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MonMiniLab{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0e0f11;
      --surface:     #161820;
      --surface-2:   #1c1f27;
      --border:      #242830;
      --border-2:    #31364280;
      --text:        #dce1eb;
      --muted:       #939db3; /* ~6.3:1 sur --surface-2 — WCAG AA */
      --dim:         #5a6275; /* réservé usage décoratif uniquement */
      --brand:       #a00000;
      --brand-h:     #c00000;
      --brand-bg:    rgba(160,0,0,.09);
      --green:       #22c55e;
      --green-bg:    rgba(34,197,94,.10);
      --amber:       #f59e0b;
      --amber-bg:    rgba(245,158,11,.10);
      --red:         #ef4444;
      --red-bg:      rgba(239,68,68,.10);
      --focus:       #5b9dff;
      --r:           6px;
      --font:        'Syne', sans-serif;
      --mono:        'JetBrains Mono', monospace;
    }

    html { font-size: 15px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* SKIP LINK */
    .skip-link {
      position: absolute; top: -100%; left: 8px;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 14px; border-radius: var(--r);
      font-size: .85rem; font-weight: 600; text-decoration: none;
      z-index: 9999;
    }
    .skip-link:focus { top: 8px; }

    /* SR-ONLY */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* FOCUS */
    :focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    /* NAV */
    .topnav {
      height: 54px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 12px;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: .92rem;
      letter-spacing: .015em;
    }
    .nav-brand:hover .nav-wordmark { color: #fff; }
    .nav-mark {
      width: 27px; height: 27px;
      background: var(--brand);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: .58rem; font-weight: 800; color: #fff;
      letter-spacing: -.01em; flex-shrink: 0;
    }
    .nav-wordmark { color: var(--text); transition: color .15s; }
    .nav-divider {
      width: 1px; height: 18px;
      background: var(--border); flex-shrink: 0;
    }
    .nav-actions {
      display: flex; align-items: center; gap: 8px;
      margin-left: auto;
    }

    /* MAIN */
    .page-wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 36px 28px 72px;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--r);
      font-family: var(--font); font-size: .83rem; font-weight: 600;
      cursor: pointer; border: 1px solid transparent;
      transition: background .14s, color .14s, border-color .14s;
      text-decoration: none; white-space: nowrap; line-height: 1;
    }
    .btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .btn-primary:hover { background: var(--brand-h); border-color: var(--brand-h); }
    .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { background: var(--surface); color: var(--text); border-color: var(--border-2); }
    .btn-danger { background: transparent; color: var(--red); border-color: transparent; }
    .btn-danger:hover { background: var(--red-bg); border-color: rgba(239,68,68,.25); }
    .btn-sm { padding: 5px 11px; font-size: .78rem; }
    .btn-block { width: 100%; justify-content: center; padding-top: 10px; padding-bottom: 10px; }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }
    .card-body { padding: 24px; }
    .card-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title {
      font-size: .78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .09em;
      color: var(--muted);
    }

    /* TABLE */
    .data-table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    .data-table th {
      padding: 10px 16px; text-align: left;
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .09em; color: var(--muted); /* AA compliant */
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr { transition: background .1s; }
    .data-table tbody tr:hover td { background: var(--surface-2); }

    /* BADGES */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 99px;
      font-size: .7rem; font-weight: 700; letter-spacing: .02em;
    }
    .badge::before {
      content: ''; width: 5px; height: 5px;
      border-radius: 50%; flex-shrink: 0;
    }
    .badge-ready   { background: var(--green-bg); color: var(--green); }
    .badge-ready::before { background: var(--green); }
    .badge-creating { background: var(--amber-bg); color: var(--amber); }
    .badge-creating::before { background: var(--amber); animation: blink 1.2s ease infinite; }
    .badge-error   { background: var(--red-bg); color: var(--red); }
    .badge-error::before { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    @media (prefers-reduced-motion: reduce) {
      .badge-creating::before { animation: none; }
      .spin { animation: none; opacity: .6; }
    }

    /* FORM */
    .form-group { margin-bottom: 22px; }
    .form-label {
      display: block; font-size: .73rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); margin-bottom: 7px;
    }
    .form-input {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 9px 13px; font-family: var(--font); font-size: .88rem;
      color: var(--text); outline: none;
      transition: border-color .14s, box-shadow .14s;
    }
    .form-input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(91,157,255,.25);
      outline: none;
    }
    .form-input::placeholder { color: var(--muted); }
    .form-hint { font-size: .73rem; color: var(--muted); margin-top: 6px; }
    .input-row { display: flex; }
    .input-row .form-input { border-radius: var(--r) 0 0 var(--r); flex: 1; }
    .input-suffix {
      background: var(--surface-2); border: 1px solid var(--border);
      border-left: none; border-radius: 0 var(--r) var(--r) 0;
      padding: 9px 13px; font-size: .82rem; color: var(--muted);
      white-space: nowrap; font-family: var(--mono);
    }

    /* ALERTS */
    .alert {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 11px 14px; border-radius: var(--r); font-size: .85rem;
    }
    .alert-ok  { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,.18); }
    .alert-err { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(239,68,68,.18); }

    /* STEPS */
    .step-list { list-style: none; }
    .step-item {
      display: flex; align-items: center; gap: 13px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .step-item:last-child { border-bottom: none; }
    .step-dot {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; color: var(--muted); flex-shrink: 0;
      transition: border-color .2s, background .2s;
    }
    .step-dot.is-running { border-color: var(--brand); background: var(--brand-bg); }
    .step-dot.is-done    { border-color: var(--green); background: var(--green-bg); color: var(--green); }
    .step-dot.is-error   { border-color: var(--red);   background: var(--red-bg);   color: var(--red); }
    .step-text { font-size: .875rem; color: var(--muted); transition: color .15s; }
    .step-text.is-active { color: var(--text); font-weight: 600; }

    /* URL BAR */
    .url-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--r); padding: 8px 12px;
    }
    .url-bar code {
      font-family: var(--mono); font-size: .78rem;
      color: var(--muted); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .url-bar a { color: var(--muted); font-size: .9rem; text-decoration: none; flex-shrink: 0; }
    .url-bar a:hover { color: var(--text); }

    /* INFO ROWS */
    .info-list { list-style: none; }
    .info-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .info-item:last-child { border-bottom: none; }
    .info-key { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
    .info-val { font-family: var(--mono); font-size: .8rem; color: var(--text); }

    /* SPINNER */
    .spin {
      width: 13px; height: 13px;
      border: 2px solid var(--brand-bg); border-top-color: var(--brand);
      border-radius: 50%; animation: rot .65s linear infinite; flex-shrink: 0;
    }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* PROGRESS LABEL */
    .progress-status {
      display: flex; align-items: center; gap: 8px;
      font-size: .78rem; color: var(--muted); margin-bottom: 14px;
    }

    /* PAGE HEADER */
    .page-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    .page-hd-title { font-size: 1.05rem; font-weight: 700; }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 620px) { .grid-2 { grid-template-columns: 1fr; } }

    /* UTILS */
    .mono { font-family: var(--mono); }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: .8rem; }
    .fw-7 { font-weight: 700; }
    .flex { display: flex; }
    .flex-center { display: flex; align-items: center; }
    .gap-2 { gap: 8px; }
    .ms-auto { margin-left: auto; }
    .mt-3 { margin-top: 14px; }
    .mt-4 { margin-top: 22px; }
    .mb-3 { margin-bottom: 14px; }
    .mb-4 { margin-bottom: 22px; }
    .hidden { display: none !important; }
    .pill {
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--muted); font-size: .7rem; font-weight: 700;
      padding: 2px 9px; border-radius: 99px;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Aller au contenu</a>

  <nav class="topnav" aria-label="Navigation principale">
    <a class="nav-brand" href="{% block home_url %}/{% endblock %}">
      <span class="nav-mark" aria-hidden="true">MML</span>
      <span class="nav-wordmark">MonMiniLab</span>
    </a>
    {% block nav_breadcrumb %}{% endblock %}
    <div class="nav-actions" role="toolbar" aria-label="Actions de la page">
      {% block nav_actions %}{% endblock %}
    </div>
  </nav>

  <main class="page-wrap" id="main-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
